name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.19.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint & Typecheck
        run: pnpm run check
      - name: Test
        run: pnpm run test
      - name: Build
        run: pnpm run build
      - name: Report bundle size
        run: |
          SIZE=$(wc -c < dist/bundle.js)
          SIZE_KB=$((SIZE / 1024))
          echo "### Bundle Size" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`bundle.js\` | ${SIZE_KB} KB |" >> "$GITHUB_STEP_SUMMARY"
      - name: Security audit
        run: pnpm audit --prod
        continue-on-error: true
